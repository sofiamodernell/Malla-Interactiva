<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malla Interactiva IMEC - Plan 2023</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Malla Interactiva Universitaria</h1>
        <p>Visualiza y gestiona tu progreso académico</p>
    </header>

    <div class="controls">
        <label>Carrera seleccionada: </label>
        <select id="carrera-selector" onchange="renderMalla(this.value)">
            <option value="imec_2023">Ingeniería en Mecatrónica (Plan 2023)</option>
            <option value="diseno_dummy">Diseño Industrial (Ejemplo)</option>
        </select>
    </div>

    <div id="malla-container" class="malla-wrapper"></div>

    <div class="stats-bar">
        Créditos Acumulados: <span id="creditos-count">0</span>
    </div>

    <script src="script.js"></script>

</body>
</html>
