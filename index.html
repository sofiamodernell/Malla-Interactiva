<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malla Interactiva IMEC - Plan 2023</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Malla Interactiva IMEC</h1>
    <p>Visualiza tu progreso y desbloquea materias según sus previaturas.</p>
</header>

<div class="controls">
    <label>Carrera: </label>

    </select>
</div>

<div id="malla-container" class="malla-wrapper"></div>

<div class="stats-bar">
    Créditos Acumulados: <span id="creditos-count">0</span> / 451
</div>

<script src="script.js"></script>
</body>
</html>
